<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Room Booking System</title>
<style>
  /* Attractive styling */
  body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 20px; }
  h1 { text-align: center; color: #333; }
  form { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
  input, select, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; }
  button { background-color: #28a745; color: #fff; cursor: pointer; }
  button:hover { background-color: #218838; }
  .participants { margin-top: 10px; }
  .participant { display: flex; gap: 10px; margin-top: 5px; }
  .error { color: red; margin-top: 10px; }
</style>
</head>
<body>

<h1>Library Room Booking</h1>
<form id="bookingForm">
  <label>Date (Today only):</label>
  <input type="date" id="date" readonly />

  <label>Start Time:</label>
  <input type="time" id="startTime" required />

  <label>End Time (auto-calculated):</label>
  <input type="time" id="endTime" readonly />

  <label>Participants (Max 4):</label>
  <div id="participantsDiv">
    <button type="button" onclick="addParticipant()">Add Participant</button>
  </div>

  <label>Booked By:</label>
  <input type="text" id="bookedBy" required />

  <label>School Name:</label>
  <input type="text" id="school" required />

  <label>Course:</label>
  <input type="text" id="course" required />

  <button type="submit">Book Room</button>
</form>

<div class="error" id="errorMsg"></div>

<script>
const sheetUrl = 'https://script.google.com/macros/s/AKfycbyi98w6Rpxpp6fAaEU9UW7RnuaMynZWXIeFp30kT0h7/dev'; // Replace with your Apps Script URL

// Set today's date
document.getElementById('date').valueAsDate = new Date();

// Auto-calculate end time (+2 hours)
document.getElementById('startTime').addEventListener('change', () => {
  const start = document.getElementById('startTime').value;
  if (start) {
    const [hours, mins] = start.split(':');
    const date = new Date();
    date.setHours(parseInt(hours)+2);
    date.setMinutes(parseInt(mins));
    document.getElementById('endTime').value = date.toTimeString().slice(0,5);
  }
});

// Dynamic participants
let participantCount = 0;
function addParticipant() {
  if (participantCount >= 4) return;
  participantCount++;
  const div = document.createElement('div');
  div.className = 'participant';
  div.innerHTML = `
    <input type="text" placeholder="Name" class="participantName" required />
    <input type="text" placeholder="Roll Number" class="participantRoll" required />
    <button type="button" onclick="removeParticipant(this)">Remove</button>
  `;
  document.getElementById('participantsDiv').appendChild(div);
}

function removeParticipant(btn) {
  btn.parentElement.remove();
  participantCount--;
}

// Submit booking
document.getElementById('bookingForm').addEventListener('submit', function(e) {
  e.preventDefault();
  document.getElementById('errorMsg').innerText = '';

  const date = document.getElementById('date').value;
  const startTime = document.getElementById('startTime').value;
  const endTime = document.getElementById('endTime').value;
  const bookedBy = document.getElementById('bookedBy').value;
  const school = document.getElementById('school').value;
  const course = document.getElementById('course').value;

  const participants = [];
  document.querySelectorAll('.participant').forEach(div => {
    const name = div.querySelector('.participantName').value;
    const roll = div.querySelector('.participantRoll').value;
    participants.push({name, roll});
  });

  if (participants.length === 0) {
    document.getElementById('errorMsg').innerText = 'Add at least one participant.';
    return;
  }

  // Prepare data
  const data = {
    date, startTime, endTime,
    participants,
    bookedBy, school, course
  };

  fetch(sheetUrl, {
    method: 'POST',
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if (res.error) {
      document.getElementById('errorMsg').innerText = res.error;
    } else {
      alert(res.success);
      location.reload();
    }
  })
  .catch(err => {
    document.getElementById('errorMsg').innerText = 'Error submitting booking.';
  });
});
</script>

</body>
</html>
